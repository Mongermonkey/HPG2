<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>HPG2</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    :root{
      --c-blue:     #a1c4ff;
      --c-red:      #fab8ff;
      --c-orange:   #ffca9f;
      --c-yellow:   #fff692;
      --c-green:    #baffc3;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: rgb(8, 8, 16);
      color: rgb(232, 232, 240);
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
    }

    .content-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding-bottom: 180px;
    }

    #game-output {
      text-align: center;
      width: 128ch;
      font-size: 20px;
      margin-bottom: 2px;
      min-height: 2.4em; /* riserva spazio per almeno due righe */
    }

    .wheel-area {
      position: relative;
      width: 380px; /* era 400px */
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
    }

    #canvas {
      display: block;
      margin: 0;
      width: 380px;   /* era 400px */
      height: 380px;  /* era 400px */
      max-width: none;
    }

    #spin-btn {
      position: absolute;
      top: 50%;
      left: 100%;
      transform: translateY(-50%) translateX(8px);
      margin-left: 0;
      padding: 8px 20px;
      background-color: rgb(40, 40, 48);
      color: rgb(232, 232, 240);
      border: 2px solid rgb(80, 80, 88);
      border-radius: 5px;
      cursor: pointer;
    }

    #spin-btn:hover {
      border-color: rgb(180, 180, 220);
      box-shadow: 0 0 5px rgb(180, 180, 220);
    }

    /* Pointer SVG: nessun CSS necessario, si gestisce da solo */

    .bottom-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background-color: rgb(40, 40, 48);
      padding: 10px 15px;
      border-radius: 10px;
    }

    .bottom-bar input {
      width: 220px;
      margin: 0;
      padding: 5px 16px;
      background-color: rgb(40, 40, 48);
      color: rgb(232, 232, 240);
      font-family: monospace;
      border: 2px solid rgb(80, 80, 88);
      border-radius: 5px;
      outline: none;
    }

    .bottom-bar input:focus {
      border-color: rgb(180, 180, 220);
      box-shadow: 0 0 5px rgb(180, 180, 220);
    }

    .bottom-bar button {
      padding: 5px 15px;
      cursor: pointer;
      background-color: rgb(40, 40, 48);
      color: rgb(232, 232, 240);
      border: 2px solid rgb(80, 80, 88);
      border-radius: 5px;
      outline: none;
    }

    .bottom-bar button:focus,
    .bottom-bar button:focus-visible {
      outline: none;
      border-color: rgb(180, 180, 220);
      box-shadow: 0 0 5px rgb(180, 180, 220);
    }

    .bottom-bar button:disabled,
    .bottom-bar button:disabled:hover,
    .bottom-bar button:disabled:focus,
    .bottom-bar button:disabled:focus-visible {
      outline: none;
      background-color: rgb(40, 40, 48);
      color: rgb(232, 232, 240);
      border-color: rgb(98, 98, 110);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 1;
    }

    #next-btn {
      appearance: none;
      -webkit-appearance: none;
      font-size: 16px;
      height: 48px;
      padding: 12px 20px;
      border-radius: 10px;
      font-family: monospace;
      box-sizing: border-box;
      outline: none;
      background-color: rgb(40, 40, 48);
      color: rgb(232, 232, 240);
      cursor: pointer;
      border: 2px solid rgb(180, 180, 220);
      box-shadow: 0 0 5px rgba(180, 180, 220, 0.28);
    }

    #next-btn:not(:disabled):hover,
    #next-btn:not(:disabled):focus,
    #next-btn:not(:disabled):focus-visible,
    #next-btn:not(:disabled):active {
      outline: none;
      border-color: rgb(180, 180, 220);
      box-shadow: 0 0 5px rgba(180, 180, 220, 0.28);
    }

    #next-btn:disabled,
    #next-btn:disabled:hover,
    #next-btn:disabled:focus,
    #next-btn:disabled:focus-visible,
    #next-btn:disabled:active {
      outline: none;
      background-color: rgb(40, 40, 48);
      color: rgb(232, 232, 240);
      border-color: rgb(98, 98, 110);
      box-shadow: none;
      cursor: not-allowed;
    }

    #player-input {
      font-size: 16px;
      height: 48px;
      padding: 12px 20px;
      border-radius: 10px;
      border: 2px solid rgb(98, 98, 110);
      width: 310px;
      box-sizing: border-box;
    }

    .settings-container {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1100;
    }

    #settings-overlay {
      position: fixed;
      inset: 0;
      z-index: 1090;
      display: none;
      background: rgba(0, 0, 0, 0.22);
    }

    #settings-overlay.show {
      display: block;
    }

    #settings-btn {
      padding: 8px 12px;
      background-color: rgb(40, 40, 48);
      color: rgb(232, 232, 240);
      border: 2px solid rgb(80, 80, 88);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    #settings-btn:hover {
      border-color: rgb(180, 180, 220);
      box-shadow: 0 0 5px rgb(180, 180, 220);
    }

    .settings-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: min(165px, calc(100vw - 24px));
      max-height: calc(100vh - 90px);
      overflow: auto;
      visibility: hidden;
      opacity: 0;
      background-color: rgb(16, 16, 28);
      border: 2px solid rgb(80, 80, 88);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    .settings-menu.show {
      visibility: visible;
      opacity: 1;
    }

    .settings-menu button {
      width: 100%;
      text-align: left;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .settings-option {
      background: transparent;
      border: none;
      box-shadow: none;
      border-radius: 0;
      padding: 2px 0;
      margin: 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
    }

    .settings-option:hover,
    .settings-option:focus,
    .settings-option:focus-visible,
    .settings-option:active {
      background: transparent;
      border: none;
      box-shadow: none;
      outline: none;
    }

    .settings-option-label {
      color: rgb(162, 208, 255);
    }

    .settings-option-sep {
      color: rgb(210, 210, 220);
    }

    .settings-option-state {
      color: rgb(198, 236, 182);
    }

    .settings-option-state.is-off {
      color: rgb(250, 206, 147);
    }

    #wheel-output {
      text-align: center;
      width: 100ch;
      font-size: 20px;
      margin-top: 0;
      color: #ffd700;
      min-height: 1.5em; /* riserva spazio anche quando è vuoto */
      white-space: nowrap;        /* <--- aggiungi questa riga */
      overflow: hidden;           /* <--- opzionale: nasconde il testo che esce */
      text-overflow: ellipsis;    /* <--- opzionale: mostra "..." se il testo è troppo lungo */
    }
  </style>
</head>
<body>
  <!-- MENU SETTINGS -->
  <div id="settings-overlay"></div>
  <div class="settings-container">
    <button id="settings-btn">⚙</button>
    <div id="settings-menu" class="settings-menu">
      <button id="color-btn" class="settings-option" type="button"><span class="settings-option-label">Change color</span><span class="settings-option-sep">: </span><span class="settings-option-state is-off">OFF</span></button>
      <button id="fast-skip-btn" class="settings-option" type="button"><span class="settings-option-label">Fast skip</span><span class="settings-option-sep">: </span><span class="settings-option-state is-off">OFF</span></button>
    </div>
  </div>

  <div class="content-wrapper">
    <div id="game-output"></div>
    <div id="wheel-output"></div>
    <div id="wheel-area" class="wheel-area">
      <canvas id="canvas" width="380" height="380"></canvas>
      <button id="spin-btn" type="button">Spin</button>
      <svg class="pointer" width="28" height="28" style="position: absolute; top: 50%; left: 100%; transform: translateY(-50%) translateX(-20px);">
        <polygon points="0,14 24,4 24,24" fill="#ffffff" stroke="#000" stroke-width="2"/>
      </svg>
    </div>
  </div>

  <div class="bottom-bar">
    <input type="text" id="player-input" maxlength="30" placeholder="" autocomplete="off" />
    <button id="next-btn">❯</button>
  </div>

  <script>
    const colorPalette = [
      getComputedStyle(document.documentElement).getPropertyValue('--c-blue').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--c-red').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--c-orange').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--c-yellow').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--c-green').trim()
    ];

    function hexToRgb(hex) {
      const h = String(hex).trim().replace(/^#/, '');
      const bigint = parseInt(h, 16);
      return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
    }

    let colorInterval = null;
    let startColor = hexToRgb(colorPalette[1]);
    let endColorIndex = 2 % colorPalette.length;
    let progress = 0;
    const step = 0.02;
    window.fastSkipEnabled = false;

    function rainbowWheel() {
      const endColor = hexToRgb(colorPalette[endColorIndex]);
      const currentColor = {
        r: Math.round(startColor.r + (endColor.r - startColor.r) * progress),
        g: Math.round(startColor.g + (endColor.g - startColor.g) * progress),
        b: Math.round(startColor.b + (endColor.b - startColor.b) * progress)
      };

      // Se la ruota è stata creata (main.ts espone window.myWheel), usala
      if (window.myWheel)
      {
        const segments = window.myWheel.getSegments();
        if (segments && segments.length)
        {
          for (let i = 0; i < segments.length; i++)
          {
            // assicurati che esista fillStyle
            segments[i].fillStyle = `rgb(${currentColor.r},${currentColor.g},${currentColor.b})`;
          }
          // ridisegna la ruota usando l'API esposta
          if (window.myWheel.draw) window.myWheel.draw();
          else if (window.myWheel.wheel && typeof window.myWheel.wheel.draw === 'function') window.myWheel.wheel.draw();
        }
      }

      progress += step;
      if (progress >= 1)
      {
        progress = 0;
        startColor = endColor;
        endColorIndex = (endColorIndex + 1) % colorPalette.length;
      }
    }

    function changeColor(event) {
      if (event) event.stopPropagation();
      const btn = document.getElementById('color-btn');
      if (!colorInterval)
      {
        colorInterval = setInterval(rainbowWheel, 50);
        setOptionState(btn, 'Change color', true);
      }
      else
      {
        clearInterval(colorInterval);
        colorInterval = null;
        setOptionState(btn, 'Change color', false);
      }
    }

    function setOptionState(btn, label, isOn) {
      btn.innerHTML = `<span class="settings-option-label">${label}</span><span class="settings-option-sep">: </span><span class="settings-option-state ${isOn ? 'is-on' : 'is-off'}">${isOn ? 'ON' : 'OFF'}</span>`;
    }

    document.getElementById('color-btn').addEventListener('click', changeColor);

    function toggleFastSkip(event) {
      if (event) event.stopPropagation();
      const btn = document.getElementById('fast-skip-btn');
      window.fastSkipEnabled = !window.fastSkipEnabled;
      setOptionState(btn, 'Fast skip', window.fastSkipEnabled);
    }

    document.getElementById('fast-skip-btn').addEventListener('click', toggleFastSkip);

    const settingsBtn = document.getElementById('settings-btn');
    const settingsMenu = document.getElementById('settings-menu');
    const settingsOverlay = document.getElementById('settings-overlay');

    function setSettingsMenuOpen(isOpen) {
      settingsMenu.classList.toggle('show', isOpen);
      settingsOverlay.classList.toggle('show', isOpen);
    }

    settingsBtn.addEventListener('click', () => {
      const shouldOpen = !settingsMenu.classList.contains('show');
      setSettingsMenuOpen(shouldOpen);
    });

    settingsOverlay.addEventListener('click', () => {
      setSettingsMenuOpen(false);
    });

    document.addEventListener(
      'click', (e) => {
      if (settingsMenu.classList.contains('show') && !settingsMenu.contains(e.target) && e.target !== settingsBtn)
      {
        setSettingsMenuOpen(false);
      }
    });

    // Inizia con il cambio colore attivo
    changeColor();
  </script>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
