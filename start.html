<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>HPG2 - Start Menu</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
                        /* Nascondi i bottoni info/salva personaggio nel menu start */
                        #show-character-control {
                          display: none !important;
                        }
                    .settings-menu button {
                      width: 100%;
                      text-align: left;
                      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                    }
                .settings-option {
                  background: transparent;
                  border: none;
                  box-shadow: none;
                  border-radius: 0;
                  padding: 2px 0;
                  margin: 0;
                  cursor: pointer;
                  font-size: 13px;
                  font-weight: 400;
                }
                .settings-option:hover,
                .settings-option:focus,
                .settings-option:focus-visible,
                .settings-option:active {
                  background: transparent;
                  border: none;
                  box-shadow: none;
                  outline: none;
                }
                .settings-option-label {
                  color: rgb(162, 208, 255);
                }
                .settings-option-sep {
                  color: rgb(210, 210, 220);
                }
                .settings-option-state {
                  color: rgb(198, 236, 182);
                }
                .settings-option-state.is-off {
                  color: rgb(250, 206, 147);
                }
            .settings-menu {
              position: absolute;
              top: calc(100% + 8px);
              left: 0;
              width: min(165px, calc(100vw - 24px));
              max-height: calc(100vh - 90px);
              overflow: auto;
              visibility: hidden;
              opacity: 0;
              background-color: rgb(16, 16, 28);
              border: 2px solid rgb(80, 80, 88);
              border-radius: 12px;
              padding: 12px;
              box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
              display: flex;
              flex-direction: column;
              gap: 8px;
              transition: opacity 0.25s ease, visibility 0.25s ease;
            }
            .settings-menu.show {
              visibility: visible;
              opacity: 1;
            }
        #settings-btn {
          padding: 8px 12px;
          background-color: rgb(40, 40, 48);
          color: rgb(232, 232, 240);
          border: 2px solid rgb(80, 80, 88);
          border-radius: 8px;
          cursor: pointer;
          font-size: 14px;
          letter-spacing: 0.08em;
        }
        #settings-btn:hover {
          border-color: rgb(180, 180, 220);
          box-shadow: 0 0 5px rgb(180, 180, 220);
        }
        #audio-toggle-btn {
          padding: 8px 12px;
          background-color: rgb(40, 40, 48);
          color: rgb(232, 232, 240);
          border: 2px solid rgb(80, 80, 88);
          border-radius: 8px;
          cursor: pointer;
          font-size: 14px;
          letter-spacing: 0.08em;
          min-width: 46px;
          text-align: center;
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }
        .audio-icon {
          width: 18px;
          height: 18px;
          display: block;
        }
        .audio-icon path,
        .audio-icon polygon,
        .audio-icon line {
          stroke: #ffffff;
          fill: none;
          stroke-width: 2;
          stroke-linecap: round;
          stroke-linejoin: round;
        }
        #audio-toggle-btn:hover,
        #audio-toggle-btn:focus,
        #audio-toggle-btn:focus-visible {
          outline: none;
          border-color: rgb(180, 180, 220);
          box-shadow: 0 0 5px rgb(180, 180, 220);
        }
    .settings-container {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 6000;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #settings-overlay {
      position: fixed;
      inset: 0;
      z-index: 5990;
      display: none;
      background: rgba(0, 0, 0, 0.22);
    }
    #settings-overlay.show {
      display: block;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: rgb(8, 8, 16);
      color: rgb(232, 232, 240);
      font-family: sans-serif;
      width: 100vw;
      min-height: 100vh;
    }
    #voice-loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: rgba(8, 8, 16, 0.96);
      backdrop-filter: blur(2px);
      width: 100vw;
      height: 100vh;
    }
    #voice-loading-card {
      margin-top: 7vh;
      width: min(420px, calc(100vw - 32px));
      border: 2px solid rgb(80, 80, 88);
      border-radius: 12px;
      background: rgb(20, 20, 30);
      min-height: 320px;
      padding: 18px 20px;
      text-align: center;
      font-family: monospace;
      color: rgb(232, 232, 240);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
    }
    #voice-loading-logo {
      max-width: 440px;
      margin-bottom: 48px;
      margin-top: 0;
    }
    .voice-loading-btn {
      padding: 8px 14px;
      background-color: rgb(40, 40, 48);
      color: rgb(232, 232, 240);
      border: 2px solid rgb(80, 80, 88);
      border-radius: 8px;
      cursor: pointer;
      font-family: monospace;
      width: 35%;
      box-sizing: border-box;
      margin-top: 10px;
      font-size: 16px;
      transition: background 0.2s, border 0.2s;
    }
    .voice-loading-btn:first-of-type {
      margin-top: auto;
    }
    .voice-loading-btn:hover,
    .voice-loading-btn:focus,
    .voice-loading-btn:focus-visible {
      outline: none;
      border-color: rgb(180, 180, 220);
      box-shadow: 0 0 5px rgb(180, 180, 220);
    }
    .voice-loading-btn:disabled {
      cursor: wait;
      opacity: 0.8;
    }
  </style>
</head>
<body>


  <!-- MENU SETTINGS (come index.html, fuori overlay) -->
  <div id="settings-overlay"></div>
  <div class="settings-container">
    <button id="settings-btn" title="Settings">⚙</button>

    <button id="audio-toggle-btn" type="button" title="Audio" aria-label="Audio">
      <svg class="audio-icon" viewBox="0 0 24 24" aria-hidden="true"><polygon points="3,10 7,10 12,6 12,18 7,14 3,14"></polygon><path d="M16 9 C18 10.5,18 13.5,16 15"></path><path d="M18.8 6.5 C22.2 9.3,22.2 14.7,18.8 17.5"></path></svg>
    </button>
    <div id="settings-menu" class="settings-menu">
      <button id="color-btn" class="settings-option" type="button"><span class="settings-option-label">Change color</span><span class="settings-option-sep">: </span><span class="settings-option-state is-off">OFF</span></button>
      <button id="fast-skip-btn" class="settings-option" type="button"><span class="settings-option-label">Fast skip</span><span class="settings-option-sep">: </span><span class="settings-option-state is-off">OFF</span></button>
    </div>
  </div>

  <!-- OVERLAY E BOTTONI START -->
  <div id="voice-loading-overlay">
    <div id="voice-loading-card">
      <img id="voice-loading-logo" src="src/assets/img/HPG2_title.png" alt="HPG2 Logo" />
      <div id="voice-loading-spinner" style="display:none;"></div>
      <div id="voice-loading-title" style="display:none;"></div>
      <div id="voice-loading-subtitle"></div>
      <button id="voice-loading-load" class="voice-loading-btn" type="button">Load game</button>
      <button id="voice-loading-action" class="voice-loading-btn" type="button">New game</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/talkify-tts/dist/talkify.min.js"></script>
  <script type="module">
    import { setupCharacterPopup } from './src/ui/characterPopup.js';

    // --- Settings & Audio ---
    const colorPalette = [
      getComputedStyle(document.documentElement).getPropertyValue('--c-blue').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--c-red').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--c-orange').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--c-yellow').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--c-green').trim()
    ];
    function hexToRgb(hex) {
      const h = String(hex).trim().replace(/^#/, '');
      const bigint = parseInt(h, 16);
      return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: (bigint) & 255 };
    }
    let colorInterval = null;
    let startColor = hexToRgb(colorPalette[1]);
    let endColorIndex = 2 % colorPalette.length;
    let progress = 0;
    const step = 0.02;
    window.fastSkipEnabled = false;
    const DIALOGUE_AUDIO_STORAGE_KEY = 'hpg2-dialogue-audio-enabled';
      const COLOR_OPTION_KEY = 'hpg2-color-option-enabled';
      const FAST_SKIP_OPTION_KEY = 'hpg2-fast-skip-enabled';
      // Carica stato opzioni da localStorage
      function loadColorOption() {
        try { return localStorage.getItem(COLOR_OPTION_KEY) === 'true'; } catch { return false; }
      }
      function saveColorOption(isEnabled) {
        try { localStorage.setItem(COLOR_OPTION_KEY, String(isEnabled)); } catch {}
      }
      function loadFastSkipOption() {
        try { return localStorage.getItem(FAST_SKIP_OPTION_KEY) === 'true'; } catch { return false; }
      }
      function saveFastSkipOption(isEnabled) {
        try { localStorage.setItem(FAST_SKIP_OPTION_KEY, String(isEnabled)); } catch {}
      }
      window.fastSkipEnabled = loadFastSkipOption();
    function loadDialogueAudioSetting() {
      try { return localStorage.getItem(DIALOGUE_AUDIO_STORAGE_KEY) === 'true'; } catch { return false; }
    }
    function saveDialogueAudioSetting(isEnabled) {
      try { localStorage.setItem(DIALOGUE_AUDIO_STORAGE_KEY, String(isEnabled)); } catch {}
    }
    window.dialogueAudioEnabled = loadDialogueAudioSetting();
    function rainbowWheel() {
      const endColor = hexToRgb(colorPalette[endColorIndex]);
      const currentColor = {
        r: Math.round(startColor.r + (endColor.r - startColor.r) * progress),
        g: Math.round(startColor.g + (endColor.g - startColor.g) * progress),
        b: Math.round(startColor.b + (endColor.b - startColor.b) * progress)
      };
      progress += step;
      if (progress >= 1) {
        progress = 0;
        startColor = endColor;
        endColorIndex = (endColorIndex + 1) % colorPalette.length;
      }
    }
    function changeColor(event) {
      if (event) event.stopPropagation();
      const btn = document.getElementById('color-btn');
      if (!colorInterval) {
        colorInterval = setInterval(rainbowWheel, 50);
        setOptionState(btn, 'Change color', true);
          saveColorOption(true);
      } else {
        clearInterval(colorInterval);
        colorInterval = null;
        setOptionState(btn, 'Change color', false);
          saveColorOption(false);
      }
    }
    function setOptionState(btn, label, isOn) {
      btn.innerHTML = `<span class="settings-option-label">${label}</span><span class="settings-option-sep">: </span><span class="settings-option-state ${isOn ? 'is-on' : 'is-off'}">${isOn ? 'ON' : 'OFF'}</span>`;
    }
    document.getElementById('color-btn').addEventListener('click', changeColor);
    function toggleFastSkip(event) {
      if (event) event.stopPropagation();
      const btn = document.getElementById('fast-skip-btn');
      window.fastSkipEnabled = !window.fastSkipEnabled;
      setOptionState(btn, 'Fast skip', window.fastSkipEnabled);
        saveFastSkipOption(window.fastSkipEnabled);
    }
    document.getElementById('fast-skip-btn').addEventListener('click', toggleFastSkip);
    const audioToggleBtn = document.getElementById('audio-toggle-btn');
    const audioIconOn = '<svg class="audio-icon" viewBox="0 0 24 24" aria-hidden="true"><polygon points="3,10 7,10 12,6 12,18 7,14 3,14"></polygon><path d="M16 9 C18 10.5,18 13.5,16 15"></path><path d="M18.8 6.5 C22.2 9.3,22.2 14.7,18.8 17.5"></path></svg>';
    const audioIconOff = '<svg class="audio-icon" viewBox="0 0 24 24" aria-hidden="true"><polygon points="3,10 7,10 12,6 12,18 7,14 3,14"></polygon><line x1="5" y1="5" x2="19" y2="19"></line></svg>';
    function syncAudioToggleUi() {
      const isOn = Boolean(window.dialogueAudioEnabled);
      audioToggleBtn.innerHTML = isOn ? audioIconOn : audioIconOff;
      audioToggleBtn.title = `Audio: ${isOn ? 'ON' : 'OFF'}`;
      audioToggleBtn.setAttribute('aria-label', `Audio: ${isOn ? 'ON' : 'OFF'}`);
    }
    function toggleDialogueAudio(event) {
      if (event) event.stopPropagation();
      window.dialogueAudioEnabled = !window.dialogueAudioEnabled;
      saveDialogueAudioSetting(window.dialogueAudioEnabled);
      syncAudioToggleUi();
    }
    audioToggleBtn.addEventListener('click', toggleDialogueAudio);
    syncAudioToggleUi();
    const settingsBtn = document.getElementById('settings-btn');
    const settingsMenu = document.getElementById('settings-menu');
    const settingsOverlay = document.getElementById('settings-overlay');
    function setSettingsMenuOpen(isOpen) {
      settingsMenu.classList.toggle('show', isOpen);
      settingsOverlay.classList.toggle('show', isOpen);
    }
    settingsBtn.addEventListener('click', () => {
      const shouldOpen = !settingsMenu.classList.contains('show');
      setSettingsMenuOpen(shouldOpen);
    });
    settingsOverlay.addEventListener('click', () => {
      setSettingsMenuOpen(false);
    });
    document.addEventListener('click', (e) => {
      if (settingsMenu.classList.contains('show') && !settingsMenu.contains(e.target) && e.target !== settingsBtn && e.target !== audioToggleBtn) {
        setSettingsMenuOpen(false);
      }
    });
    // Inizia con il cambio colore attivo
      // All'avvio, imposta lo stato delle opzioni in base a localStorage
      const colorBtn = document.getElementById('color-btn');
      if (loadColorOption()) {
        colorInterval = setInterval(rainbowWheel, 50);
        setOptionState(colorBtn, 'Change color', true);
      } else {
        setOptionState(colorBtn, 'Change color', false);
      }
      const fastSkipBtn = document.getElementById('fast-skip-btn');
      setOptionState(fastSkipBtn, 'Fast skip', window.fastSkipEnabled);

    // --- Character Popup (info/salva) ---
    // Nel menu start: bottoni dentro il card centrale
    const card = document.getElementById('voice-loading-card');
    setupCharacterPopup(window, card);

    // --- Pulsanti overlay ---
    document.getElementById('voice-loading-action').addEventListener('click', function() {
      sessionStorage.setItem('fromStartMenu', '1');
      sessionStorage.removeItem('mainChara');
      sessionStorage.removeItem('saveFile');
      sessionStorage.removeItem('startYear');
      window.location.href = 'index.html';
    });
    document.getElementById('voice-loading-load').addEventListener('click', async function() {
      // Overlay per selezione file
      let overlay = document.createElement('div');
      overlay.id = 'loadgame-overlay';
      overlay.style.position = 'fixed';
      overlay.style.inset = '0';
      overlay.style.background = 'rgba(8,8,16,0.85)';
      overlay.style.zIndex = '6000';
      overlay.style.display = 'flex';
      overlay.style.alignItems = 'center';
      overlay.style.justifyContent = 'center';
      overlay.innerHTML = `<div id="loadgame-box" style="background:rgb(20,20,30);border-radius:12px;padding:28px 24px;min-width:320px;max-width:90vw;box-shadow:0 0 20px #000;border:2px solid #444;position:relative;">
        <div style='font-size:18px;margin-bottom:12px;font-family:monospace;color:#e8e8f0;'>Select a save file</div>
        <div id="loadgame-list"></div>
      </div>`;
      document.body.appendChild(overlay);

      // Chiudi overlay cliccando fuori
      overlay.addEventListener('mousedown', function(e) {
        if (e.target === overlay) {
          overlay.remove();
        }
      });

      // Carica lista file json dalla cartella saves (solo lato locale, non server)
      let saves = [];
      try {
        // In ambiente web statico, non si può leggere la cartella. Simuliamo con fetch di un file noto.
        // In produzione, qui si dovrebbe avere una API o una lista generata lato server.
        saves = ['matt.json']; // TODO: automatizzare se serve
      } catch {
        saves = [];
      }
      const listDiv = overlay.querySelector('#loadgame-list');
      if (!saves.length) {
        listDiv.innerHTML = '<div style="color:#bbb;">No save files found.</div>';
        return;
      }
      let selected = null;
      function renderList() {
        listDiv.innerHTML = '';
        saves.forEach(f => {
          const btn = document.createElement('button');
          btn.textContent = f;
          btn.style.display = 'block';
          btn.style.width = '100%';
          btn.style.margin = '6px 0';
          btn.style.padding = '10px';
          btn.style.fontFamily = 'monospace';
          btn.style.fontSize = '15px';
          btn.style.background = selected === f ? '#282860' : '#282830';
          btn.style.color = selected === f ? '#fff' : '#e8e8f0';
          btn.style.border = selected === f ? '2px solid #b4b4dc' : '2px solid #444';
          btn.style.borderRadius = '8px';
          btn.style.cursor = 'pointer';
          btn.addEventListener('click', (ev) => {
            ev.stopPropagation();
            selected = f;
            renderList();
            showConfirm();
          });
          listDiv.appendChild(btn);
        });
      }
      renderList();

      // Pop-up conferma scelta
      function showConfirm() {
        let confirmDiv = document.createElement('div');
        confirmDiv.style.position = 'fixed';
        confirmDiv.style.left = '0';
        confirmDiv.style.top = '0';
        confirmDiv.style.width = '100vw';
        confirmDiv.style.height = '100vh';
        confirmDiv.style.background = 'rgba(0,0,0,0.25)';
        confirmDiv.style.display = 'flex';
        confirmDiv.style.alignItems = 'center';
        confirmDiv.style.justifyContent = 'center';
        confirmDiv.style.zIndex = '7000';
        confirmDiv.innerHTML = `<div style='background:rgb(30,30,40);padding:32px 28px;border-radius:12px;box-shadow:0 0 16px #000;border:2px solid #888;min-width:220px;text-align:center;'>
          <div style='font-size:16px;margin-bottom:18px;color:#e8e8f0;font-family:monospace;'>Confirm choice?</div>
          <button id='loadgame-yes' style='margin:0 12px 0 0;padding:8px 18px;border-radius:8px;border:2px solid #444;background:#282830;color:#fff;font-family:monospace;font-size:15px;cursor:pointer;'>Yes</button>
          <button id='loadgame-no' style='padding:8px 18px;border-radius:8px;border:2px solid #444;background:#282830;color:#fff;font-family:monospace;font-size:15px;cursor:pointer;'>No</button>
        </div>`;
        document.body.appendChild(confirmDiv);
        confirmDiv.addEventListener('mousedown', function(e) {
          if (e.target === confirmDiv) confirmDiv.remove();
        });
        confirmDiv.querySelector('#loadgame-no').addEventListener('click', function() {
          confirmDiv.remove();
        });
        confirmDiv.querySelector('#loadgame-yes').addEventListener('click', async function() {
          confirmDiv.remove();
          // Carica file selezionato
          try {
            const resp = await fetch('saves/' + selected);
            const data = await resp.json();
            let year = Number(data.year);
            if (year === 7) {
              // Game ended
              let endedDiv = document.createElement('div');
              endedDiv.style.position = 'fixed';
              endedDiv.style.left = '0';
              endedDiv.style.top = '0';
              endedDiv.style.width = '100vw';
              endedDiv.style.height = '100vh';
              endedDiv.style.background = 'rgba(0,0,0,0.25)';
              endedDiv.style.display = 'flex';
              endedDiv.style.alignItems = 'center';
              endedDiv.style.justifyContent = 'center';
              endedDiv.style.zIndex = '8000';
              endedDiv.innerHTML = `<div style='background:rgb(30,30,40);padding:32px 28px;border-radius:12px;box-shadow:0 0 16px #000;border:2px solid #888;min-width:220px;text-align:center;'>
                <div style='font-size:16px;margin-bottom:18px;color:#e8e8f0;font-family:monospace;'>Game ended</div>
                <button id='ended-ok' style='padding:8px 18px;border-radius:8px;border:2px solid #444;background:#282830;color:#fff;font-family:monospace;font-size:15px;cursor:pointer;'>OK</button>
              </div>`;
              document.body.appendChild(endedDiv);
              endedDiv.querySelector('#ended-ok').addEventListener('click', function() {
                endedDiv.remove();
              });
              return;
            }
            // Avvia gioco da year{year+1}.ts
            sessionStorage.setItem('saveFile', selected);
            sessionStorage.setItem('fromStartMenu', '1');
            sessionStorage.setItem('startYear', String(year + 1));
            sessionStorage.setItem('mainChara', JSON.stringify(data));
            overlay.remove();
            window.location.href = 'index.html';
          } catch {
            alert('Errore nel caricamento del file di salvataggio.');
            overlay.remove();
          }
        });
      }
    });
  </script>
</body>
</html>
